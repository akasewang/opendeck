name: Ingest daily

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ingest-daily
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        id: install
        run: npm ci
      - name: Ingest discovery
        run: npx tsx src/operations/cli.ts ingest discovery
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GH_INGEST_TOKEN || github.token }}
      - name: Refresh stale metadata
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        run: npx tsx src/operations/cli.ts ingest metadata 50
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GH_INGEST_TOKEN || github.token }}
      - name: Ingest trending
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        run: npx tsx src/operations/cli.ts ingest trending
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GH_INGEST_TOKEN || github.token }}
